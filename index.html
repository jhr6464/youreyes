<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Doll - Logic Refined</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background-color: #000; width: 100vw; height: 100vh; }

        /* 배경 인형 영상 */
        #doll-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        video.doll-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 그래픽 오버레이 (text.png) */
        #graphic-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('text.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        /* 우측 하단 캠 화면 */
        #input_video {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 220px;
            border-radius: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            transform: scaleX(-1);
            z-index: 10;
            background: #111;
            display: none;
        }

        /* 시작 대기 화면 (start.jpg) */
        #click-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('start.jpg');
            background-size: cover;
            background-position: center;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="click-layer"></div>

    <div id="doll-container">
        <video id="v-open" class="doll-video" src="open.mp4" muted playsinline></video>
        <video id="v-closed" class="doll-video" src="closed.mp4" muted playsinline></video>
    </div>

    <div id="graphic-overlay"></div>
    <video id="input_video"></video>

    <script>
        const vOpen = document.getElementById('v-open');
        const vClosed = document.getElementById('v-closed');
        const inputVideo = document.getElementById('input_video');
        const clickLayer = document.getElementById('click-layer');
        const graphicOverlay = document.getElementById('graphic-overlay');
        
        let lastHandState = null; // 'open' 혹은 'closed' 저장
        let toggleTimestamps = [];

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                // 검지 끝이 마디보다 높으면(y가 작으면) open
                const isHandOpen = landmarks[8].y < landmarks[6].y;
                const currentState = isHandOpen ? 'open' : 'closed';

                // [핵심] 손 상태가 바뀌었을 때만 영상 초기화 및 재생
                if (lastHandState !== currentState) {
                    const activeVideo = isHandOpen ? vOpen : vClosed;
                    const inactiveVideo = isHandOpen ? vClosed : vOpen;

                    // 이전 상태 영상은 숨기고 현재 영상은 처음부터 재생
                    inactiveVideo.style.display = 'none';
                    activeVideo.style.display = 'block';
                    activeVideo.currentTime = 0; 
                    activeVideo.play();

                    toggleTimestamps.push(Date.now());
                    lastHandState = currentState;
                }

                // 속도 계산 로직 (빠르게 접고 펴면 영상도 빨라짐)
                const now = Date.now();
                toggleTimestamps = toggleTimestamps.filter(t => now - t < 2000);
                let speed = 1.0 + (toggleTimestamps.length * 0.3);
                if (speed > 5.0) speed = 5.0;

                vOpen.playbackRate = speed;
                vClosed.playbackRate = speed;
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(inputVideo, {
            onFrame: async () => { await hands.send({image: inputVideo}); },
            width: 640, height: 480
        });

        clickLayer.addEventListener('click', () => {
            clickLayer.style.display = 'none';
            inputVideo.style.display = 'block';
            graphicOverlay.style.display = 'block';
            camera.start();
        });
    </script>
</body>
</html>
